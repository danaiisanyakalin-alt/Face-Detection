<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Scan</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script defer src="face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: rgb(255, 255, 255);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .video-container {
        position: relative;
        width: 100%;
        height: 100vh;
      }
      video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        -webkit-transform: scaleX(-1);
        -moz-transform: scaleX(-1);
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        transform: scaleX(-1);
        -webkit-transform: scaleX(-1);
        -moz-transform: scaleX(-1);
      }
      .success_status {
        display: none;
        position: absolute;
        width: auto;
        top: 50%;
        opacity: 0;
        transition: opacity 2s ease-in-out;
        box-shadow: 3px 5px 4px rgba(0, 0, 0, 0.317);
      }
      .success_status img {
        width: 100px;
      }
      .face-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .face-overlay::before {
        content: "";
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 350px;
        border-radius: 50%;
        border: 4px dashed rgb(255, 255, 255);
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.358);
      }
      .face-overlay.success::before {
        border: 4px solid rgb(26, 207, 89);
      }
      .face-overlay.loading::before {
        border: 4px solid rgb(52, 221, 248);
      }

      .loadings {
        position: fixed;
        display: none;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
        background: rgb(6, 74, 142);
        background: linear-gradient(
          153deg,
          rgba(6, 74, 142, 1) 0%,
          rgba(8, 135, 191, 1) 50%,
          rgb(39, 167, 214) 100%
        );
        overflow: hidden;
        z-index: 99;
      }
      .lds-dual-ring,
      .lds-dual-ring:after {
        box-sizing: border-box;
      }
      .lds-dual-ring {
        display: inline-block;
        width: 80px;
        height: 80px;
      }
      .lds-dual-ring:after {
        content: " ";
        display: block;

        width: 64px;
        height: 64px;
        margin: 8px;
        border-radius: 50%;
        border: 6.4px solid #fff;
        border-color: #fff transparent #fff transparent;
        animation: lds-dual-ring 1.2s linear infinite;
      }
      @keyframes lds-dual-ring {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <div class="loadings load">
    <div class="lds-dual-ring"></div>
  </div>
  <body class="overflow-hidden">
    <div class="video-container">
      <video id="video" autoplay muted playsinline></video>
      <div class="face-overlay"></div>
    </div>
    <div
      class="rounded-full bg-white p-[1px] w-auto success_status"
      style="z-index: 999"
    >
      <img src="./success.png" alt="success" class="block" />
    </div>
  </body>
</html>
